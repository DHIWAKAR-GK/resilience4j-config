server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
          filters:
          - name: CircuitBreaker
            args:
              name: user-service
              fallbackUri: forward:/UserFallBack
            
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products/**
          filters:
          - name: CircuitBreaker
            args:
              name: product-service
              fallbackUri: forward:/ProductFallBack

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**
          filters:
          - name: CircuitBreaker
            args:
              name: order-service
              fallbackUri: forward:/OrderFallBack

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 12s
        permittedNumberOfCallsInHalfOpenState: 3
        eventConsumerBufferSize: 10
      

      product-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 12s
        permittedNumberOfCallsInHalfOpenState: 3
        eventConsumerBufferSize: 10
      
      order-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 12s
        permittedNumberOfCallsInHalfOpenState: 3
        eventConsumerBufferSize: 10


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
